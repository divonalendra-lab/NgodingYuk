<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NgodingYuk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="CSS/style.css">
    <style>
        body {
            background: var(--bg-light);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: var(--bg-white);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow-md);
        }
        .login-brand {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: -0.04em;
        }
        .login-sub {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        .btn-social {
            width: 100%;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
            background: white;
            color: var(--text-dark);
            text-decoration: none;
            margin-bottom: 12px;
        }
        .btn-social:hover {
            background: var(--bg-light);
            border-color: var(--primary);
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            margin: 20px 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }
        .divider:not(:empty)::before { margin-right: 15px; }
        .divider:not(:empty)::after { margin-left: 15px; }
        
        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .back-home:hover { color: var(--primary); }
    </style>
</head>
<body>

    <a href="index.html" class="back-home"><i class="bi bi-arrow-left"></i> Kembali ke Beranda</a>

    <div class="login-card">
        <div class="login-brand">NgodingYuk</div>
        <div class="login-sub">Masuk untuk melanjutkan belajar coding.</div>

        <a href="#" class="btn-social">
            <img src="https://www.google.com/favicon.ico" width="18" alt="Google">
            Masuk dengan Google
        </a>
        <a href="#" class="btn-social">
            <i class="bi bi-github" style="font-size: 1.1rem"></i>
            Masuk dengan GitHub
        </a>

        <div class="divider">ATAU</div>

        <form>
            <div class="mb-3">
                <label class="form-label" for="email">Email</label>
                <input type="email" class="form-control" id="email" placeholder="nama@email.com" required>
            </div>
            <div class="mb-4">
                <div class="d-flex justify-content-between">
                    <label class="form-label" for="password">Password</label>
                    <a href="#" class="text-decoration-none small" style="color: var(--primary)">Lupa password?</a>
                </div>
                <input type="password" class="form-control" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-send mb-3">Masuk ke Akun</button>
            <div class="text-center small text-muted">
                Belum punya akun? <a href="#" class="text-decoration-none fw-bold" style="color: var(--primary)">Daftar sekarang</a>
            </div>
        </form>
    </div>

</body>
</html>
